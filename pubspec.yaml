name: ecommerce_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  lucide_icons_flutter: ^3.1.14+2
  iconsax_flutter: 1.0.1
  flutter_svg: ^2.3.0
  loader_overlay: ^5.0.0
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/icon/categories/
    - assets/icon/gender/
    - assets/icon/auth/
    - assets/icon/payment/
    - assets/data/

  fonts:
    - family: MI
      fonts:
        - asset: assets/font/mi_thin.ttf
          weight: 100
        - asset: assets/font/mi_exlight.ttf
          weight: 200
        - asset: assets/font/mi_light.ttf
          weight: 300
        - asset: assets/font/mi_regular.ttf
          weight: 400
        - asset: assets/font/mi_normal.ttf
          weight: 400
        - asset: assets/font/mi_medium.ttf
          weight: 500
        - asset: assets/font/mi_semibold.ttf
          weight: 600
        - asset: assets/font/mi_demibold.ttf
          weight: 600
        - asset: assets/font/mi_bold.ttf
          weight: 700
        - asset: assets/font/mi_heavy.ttf
          weight: 900
